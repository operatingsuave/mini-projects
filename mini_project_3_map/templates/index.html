{% extends "base.html" %}

{% block content %}
  <h1>Nearest MBTA stop</h1>
  <p class="lede">Enter a place or address in the Boston area.</p>

  <form method="post" action="/">
    <label for="place">Place</label>
    <input
      type="text"
      id="place"
      name="place"
      placeholder="Boston Common"
      value="{{ place or '' }}"
      autofocus
      required
    >
    <button type="submit">Find stop</button>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </form>
{% endblock %}
