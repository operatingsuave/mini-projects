<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Nearest MBTA Stop{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.6;
      color: #888;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 5rem 1.5rem 6rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 400;
      color: #111;
      margin: 0 0 0.5rem;
      letter-spacing: -0.01em;
    }
    p.lede { margin: 0 0 2.5rem; }
    form { margin: 0; }
    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    input[type=text] {
      width: 100%;
      padding: 0.6rem 0;
      font: inherit;
      font-weight: 400;
      color: #111;
      background: transparent;
      border: 0;
      border-bottom: 1px solid #ddd;
      border-radius: 0;
      outline: none;
    }
    input[type=text]:focus { border-bottom-color: #111; }
    button {
      margin-top: 1.75rem;
      padding: 0.65rem 1.4rem;
      font: inherit;
      font-weight: 400;
      color: #fff;
      background: #111;
      border: 0;
      cursor: pointer;
    }
    button:hover { background: #000; }

    .error {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
      color: #888;
      font-size: 0.9rem;
    }

    .stop-name {
      font-size: 2rem;
      font-weight: 400;
      color: #111;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .meta {
      margin: 0.5rem 0 0;
      color: #888;
      font-size: 0.95rem;
    }
    .kv { color: #111; font-weight: 400; }

    .divider { border-top: 1px solid #eee; margin: 2.5rem 0; }
    #map {
      height: 320px;
      border: 1px solid #eee;
      margin-top: 1.5rem;
    }

    a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ddd;
    }
    a:hover { border-bottom-color: #111; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
